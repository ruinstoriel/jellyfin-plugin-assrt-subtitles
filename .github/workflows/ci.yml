name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AssrtSubtitles.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.AssrtSubtitles.sln -c Release --no-restore

      - name: Publish plugin
        run: |
          dotnet publish src/Jellyfin.Plugin.AssrtSubtitles/Jellyfin.Plugin.AssrtSubtitles.csproj -c Release --no-build -o ./publish
          mkdir -p artifacts
          (cd publish && zip -r ../artifacts/assrt-subtitles-plugin.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assrt-subtitles-plugin
          path: artifacts/assrt-subtitles-plugin.zip

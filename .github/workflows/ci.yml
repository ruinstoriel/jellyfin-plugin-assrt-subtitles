name: CI

on:
  push:
    branches: ["*"]
    tags: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AssrtSubtitles.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.AssrtSubtitles.sln -c Release --no-restore

      - name: Publish plugin
        run: |
          # 编译到临时目录
          dotnet publish src/Jellyfin.Plugin.AssrtSubtitles/Jellyfin.Plugin.AssrtSubtitles.csproj -c Release --no-build -o ./publish_raw
          
          # 创建精确打包的目录
          mkdir -p ./publish_zip
          mkdir -p artifacts
          
          # 只复制你指定的两个文件
          cp ./publish_raw/Jellyfin.Plugin.AssrtSubtitles.dll ./publish_zip/
          cp ./publish_raw/Jellyfin.Plugin.AssrtSubtitles.deps.json ./publish_zip/
          
          # 压缩为固定的文件名
          (cd publish_zip && zip -r ../artifacts/assrt-subtitles-plugin.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assrt-subtitles-plugin
          path: artifacts/assrt-subtitles-plugin.zip

      # 仅在推送了 v* 格式的 tag 时才触发自动 Release 发布
      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/assrt-subtitles-plugin.zip
          name: ${{ github.ref_name }}  # Release 标题直接使用 tag 名（例如 v1.0.0）
          tag_name: ${{ github.ref_name }} # 绑定的 tag
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
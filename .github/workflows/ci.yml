name: CI

on:
  push:
    branches: ["*"]
    tags: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: write # 允许发布 Release 和推送到 gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AssrtSubtitles.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.AssrtSubtitles.sln -c Release --no-restore

      - name: Publish plugin
        run: |
          dotnet publish src/Jellyfin.Plugin.AssrtSubtitles/Jellyfin.Plugin.AssrtSubtitles.csproj -c Release --no-build -o ./publish_raw
          mkdir -p ./publish_zip
          mkdir -p artifacts
          cp ./publish_raw/Jellyfin.Plugin.AssrtSubtitles.dll ./publish_zip/
          cp ./publish_raw/Jellyfin.Plugin.AssrtSubtitles.deps.json ./publish_zip/
          
          # 压缩插件包（不含清单）
          (cd publish_zip && zip -r ../artifacts/assrt-subtitles-plugin.zip .)

      - name: Process Manifest for GitHub Pages
        if: github.ref_type == 'tag'
        run: |
          TAG_NAME="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          
          # 1. 计算最终产生的 ZIP 的 MD5 并转大写
          ZIP_MD5=$(md5sum artifacts/assrt-subtitles-plugin.zip | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
          echo "ZIP_MD5=$ZIP_MD5" >> $GITHUB_ENV
          echo "$ZIP_MD5  assrt-subtitles-plugin.zip" > artifacts/assrt-subtitles-plugin.zip.md5
          
          # 2. 准备一个专门用来发布到 GitHub Pages 的干净目录
          mkdir -p ./pages_out
          
          # 3. 读取当前项目里的基础模板模板，并用 jq 追加最新版本节点
          # 哪怕你 main 分支里的 manifest.json 一直不更新，CI 也会以它为底本，动态在内存里把最新一版叠加上去
          NEW_VERSION_JSON=$(cat <<EOF
          {
            "version": "${TAG_NAME}",
            "changelog": "${COMMIT_MSG}",
            "targetAbi": "10.11.0.0",
            "sourceUrl": "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/assrt-subtitles-plugin.zip",
            "checksum": "${ZIP_MD5}"
          }
          EOF
          )
          
          jq --argjson new "$NEW_VERSION_JSON" '.[0].versions = ([$new] + .[0].versions)' manifest.json > ./pages_out/manifest.json

      # 核心步骤：将生成的 manifest.json 单独部署到当前仓库的 gh-pages 分支
      - name: Deploy Manifest to GitHub Pages
        if: github.ref_type == 'tag'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_out # 只把这个目录里的 manifest.json 发送去当网页
          publish_branch: gh-pages
          force_orphan: false # 保持历史追加，而不是每次彻底清空分支

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assrt-subtitles-plugin
          path: |
            artifacts/assrt-subtitles-plugin.zip
            artifacts/assrt-subtitles-plugin.zip.md5

      # 发布到 GitHub Release
      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/assrt-subtitles-plugin.zip
            artifacts/assrt-subtitles-plugin.zip.md5
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ### Release Assets Checksum
            
            | File | MD5 Checksum |
            | :--- | :--- |
            | `assrt-subtitles-plugin.zip` | `${{ env.ZIP_MD5 }}` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
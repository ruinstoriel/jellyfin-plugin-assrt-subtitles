<!DOCTYPE html>
<html>

<head>
    <title>Assrt.net Subtitles</title>
</head>

<body>
    <div id="assrtSubtitlesConfigurationPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="assrtSubtitlesConfigForm">
                    <div class="inputContainer">
                        <label for="assrtApiToken">API token</label>
                        <input id="assrtApiToken" name="assrtApiToken" type="text" required />
                        <div class="fieldDescription">
                            Token from assrt.net. A development token is pre-filled for convenience.
                        </div>
                    </div>

                    <div class="inputContainer">
                        <label for="assrtLanguages">Preferred languages</label>
                        <input id="assrtLanguages" name="assrtLanguages" type="text" placeholder="zho" />
                        <div class="fieldDescription">
                            Comma separated ISO 639-3 codes (for example: zho,eng). Leave empty to use server defaults.
                        </div>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            const pluginId = "6c94cceb-4ebc-4d5c-bbb6-2d1c9d0c2e40";
            // 监听 Jellyfin SPA 路由载入该页面节点的事件
            document.querySelector('#assrtSubtitlesConfigurationPage').addEventListener('pageshow', function () {


                // 1. 回显加载配置
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(pluginId).then(config => {
                    document.querySelector("#assrtApiToken").value = config.ApiToken || "";
                    document.querySelector("#assrtLanguages").value = (config.PreferredLanguages || []).join(",");
                    Dashboard.hideLoadingMsg();
                }).catch(err => {
                    console.error("加载 Assrt 插件配置失败:", err);
                    Dashboard.hideLoadingMsg();
                });
            });
            document.querySelector("#assrtSubtitlesConfigForm").addEventListener('submit', function (event) {
                event.preventDefault();
                Dashboard.showLoadingMsg();

                ApiClient.getPluginConfiguration(pluginId).then(config => {
                    config.ApiToken = document.querySelector("#assrtApiToken").value.trim();
                    config.PreferredLanguages = document.querySelector("#assrtLanguages").value
                        .split(",")
                        .map(x => x.trim())
                        .filter(Boolean);

                    return ApiClient.updatePluginConfiguration(pluginId, config);
                }).then(result => {
                    Dashboard.hideLoadingMsg();
                    // 弹出 Jellyfin 官方的“保存成功”小气泡
                    Dashboard.processPluginConfigurationUpdateResult(result);
                }).catch(err => {
                    Dashboard.hideLoadingMsg();
                    console.error("保存 Assrt 插件配置失败:", err);
                });
            });;
        </script>
    </div>

</body>

</html>
